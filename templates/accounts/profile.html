{% extends 'base.html' %}
{% block title %}Profile{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block body %}
<div class="stars-bg" id="starsBg"></div>
<div class="auth-container">
    <a href="{% url 'home' %}" class="auth-brand">
        <span class="brand-icon">✦</span>
        <span class="brand-text">AD ASTRA</span>
    </a>
    <div class="auth-card">
        <h2>{{ user.username }}</h2>
        <p class="auth-subtitle">{{ user.email }}</p>
        <p class="auth-subtitle">Member since {{ user.date_joined|date:"F Y" }}</p>
        <a href="{% url 'home' %}" class="btn btn-primary btn-full" style="margin-top:1.5rem">Back to Home</a>
    </div>
</div>
<script>
const bg = document.getElementById('starsBg');
for (let i = 0; i < 150; i++) {
    const s = document.createElement('div');
    s.className = 'bg-star';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*100+'%';
    s.style.animationDelay = Math.random()*3+'s';
    s.style.width = s.style.height = (Math.random()*2+1)+'px';
    bg.appendChild(s);
}
</script>
{% endblock %}
